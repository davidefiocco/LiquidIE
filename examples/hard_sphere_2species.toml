[system]
temperature = 1.0
density = [0.5252, 0.5252]

[grid]
dr = 0.05
r_max = 20.0

[potential]
expression = "hard_sphere"
epsilon = [1.0, 1.0, 1.0, 1.0]
sigma = [1.0, 1.0, 1.0, 1.0]

[solver]
closure = "PY"
tolerance = 1e-8

[restart]
enabled = false
file = "gamma.dat"

[output]
directory = "./results"
