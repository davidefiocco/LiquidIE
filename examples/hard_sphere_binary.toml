# Binary hard-sphere mixture with PY closure (Lebowitz benchmark).
#
# Two species with diameter ratio sigma_2/sigma_1 = 0.6, equimolar,
# at total packing fraction eta = 0.3.  The cross-diameter is additive:
# sigma_12 = (sigma_1 + sigma_2) / 2 = 0.8.
#
# Lebowitz (1964) derived exact PY contact values for this system,
# making it a standard validation benchmark for multi-component solvers.
#
# The sigma and epsilon arrays are given in row-major (i,j) order for
# the 2x2 species matrix: [11, 12, 21, 22].
#
# References:
#   Lebowitz, Phys. Rev. 133, A895 (1964)
#   Ashcroft & Langreth, Phys. Rev. 156, 685 (1967)

[system]
temperature = 1.0
density = [0.4712, 0.4712]    # equimolar; total rho chosen so eta = 0.3

[grid]
dr = 0.01
r_max = 20.0

[potential]
expression = "hard_sphere"
epsilon = [1.0, 1.0, 1.0, 1.0]
sigma = [1.0, 0.8, 0.8, 0.6]

[solver]
closure = "PY"
tolerance = 1e-8

[output]
directory = "./results_hs_binary"
